<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tổng Đài Quản Lý CRM | HOANGKUN STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ea580c; 
            --primary-hover: #c2410c;
            --primary-light: #fff7ed;
            --bg-main: #f4f7fb;
            --bg-panel: #ffffff;
            --border-color: #e5e7eb;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 6px 15px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px rgba(234, 88, 12, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            height: 100vh; height: 100dvh;
            display: flex; overflow: hidden; position: relative;
        }

        /* --- HIỆU ỨNG ANIMATION --- */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* ========================================= */
        /* CỘT 1: DANH SÁCH KHÁCH HÀNG (SIDEBAR)     */
        /* ========================================= */
        .sidebar {
            width: 380px;
            background: var(--bg-main);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 10;
        }
        
        .sidebar-header { padding: 25px 20px 15px 20px; background: var(--bg-main); }
        .brand-title { font-size: 1.4rem; font-weight: 800; color: var(--text-dark); display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .brand-title span { color: var(--primary); background: var(--primary-light); padding: 4px 10px; border-radius: 8px; font-size: 1rem;}
        
        /* Thanh tìm kiếm bo tròn hiện đại */
        .search-box { 
            width: 100%; padding: 14px 20px; background: #ffffff; border: 1px solid var(--border-color); 
            border-radius: 20px; font-size: 0.95rem; outline: none; transition: all 0.3s ease; box-shadow: var(--shadow-sm);
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.1); }

        /* Menu Tab kiểu iOS Segmented */
        .tab-menu { 
            display: flex; margin: 0 20px 15px 20px; background: #e2e8f0; padding: 4px; border-radius: 12px; 
        }
        .tab { 
            flex: 1; text-align: center; padding: 10px 0; font-size: 0.9rem; font-weight: 600; 
            color: var(--text-gray); cursor: pointer; border-radius: 8px; transition: all 0.3s; 
        }
        .tab.active { background: #ffffff; color: var(--primary); box-shadow: var(--shadow-sm); }

        .user-list { flex: 1; overflow-y: auto; padding: 5px 20px 20px 20px; }
        .user-list::-webkit-scrollbar { width: 0; } /* Ẩn thanh cuộn cho gọn */

        /* Thẻ Khách Hàng (Dạng Card Nổi) */
        .user-item { 
            background: #ffffff; padding: 16px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; align-items: center; gap: 15px; 
            border: 1px solid transparent; box-shadow: var(--shadow-sm); animation: slideInUp 0.4s ease forwards;
        }
        .user-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: #fed7aa; }
        .user-item.active { background: var(--primary-light); border: 1px solid #fdba74; box-shadow: var(--shadow-md); }
        .user-item:active { transform: scale(0.98); } /* Hiệu ứng nhún khi bấm */
        
        /* Avatar Gradient siêu ngầu */
        .user-avatar { 
            width: 50px; height: 50px; flex-shrink: 0; border-radius: 14px; 
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: #fff; font-size: 1.2rem; position: relative; box-shadow: 0 4px 10px rgba(253, 160, 133, 0.3);
        }
        .user-item.active .user-avatar { background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%); }
        
        /* Chấm xanh tỏa sáng (Pulse) */
        .status-dot { 
            position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; background: #10b981; 
            border: 2px solid #fff; border-radius: 50%; animation: pulse-green 2s infinite; 
        }
        
        .user-info { flex: 1; overflow: hidden; }
        .user-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .user-name { font-weight: 700; font-size: 1rem; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-time { font-size: 0.75rem; color: var(--text-gray); font-weight: 500;}
        .user-preview { font-size: 0.85rem; color: var(--text-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ========================================= */
        /* CỘT 2: KHUNG CHAT ADMIN                   */
        /* ========================================= */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-panel); }

        .chat-header { 
            padding: 20px 30px; background: var(--bg-panel); border-bottom: 1px solid var(--border-color); 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.02); z-index: 5;
        }
        .chat-header-client { display: flex; align-items: center; gap: 15px; }
        .header-avatar { 
            width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); 
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; color: #fff; 
        }
        .header-info-box { display: flex; flex-direction: column; }
        .header-name { font-weight: 800; font-size: 1.2rem; color: var(--text-dark); margin-bottom: 4px; }
        .header-status { font-size: 0.85rem; color: #10b981; display: flex; align-items: center; gap: 6px; font-weight: 600;}
        
        .chat-actions { display: flex; gap: 10px; }
        .chat-actions button { background: #f1f5f9; border: none; padding: 10px 18px; border-radius: 12px; font-size: 0.9rem; font-weight: 700; color: var(--text-dark); cursor: pointer; transition: 0.2s; }
        .chat-actions button:hover { background: #e2e8f0; }
        .chat-actions .btn-resolve { background: linear-gradient(90deg, #ea580c, #f97316); color: #fff; box-shadow: var(--shadow-lg); }
        .chat-actions .btn-resolve:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(234, 88, 12, 0.25); }
        
        .back-btn { display: none; background: none; border: none; color: var(--text-dark); cursor: pointer; margin-right: 10px; padding: 5px;}
        .back-btn svg { width: 30px; height: 30px; fill: currentColor; }

        .chat-messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #fafbfc; }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .message { max-width: 65%; padding: 16px 20px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; position: relative; animation: slideInUp 0.3s ease-out;}
        .msg-received { background: #ffffff; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); color: var(--text-dark); box-shadow: var(--shadow-sm); }
        .msg-sent { background: linear-gradient(135deg, #ea580c 0%, #f97316 100%); align-self: flex-end; border-bottom-right-radius: 4px; color: #fff; box-shadow: var(--shadow-lg); }

        .chat-input-area { padding: 20px 30px; background: var(--bg-panel); border-top: 1px solid var(--border-color); display: flex; gap: 15px; align-items: center; }
        .chat-input { flex: 1; background: var(--bg-main); border: 1px solid transparent; border-radius: 30px; padding: 16px 25px; color: var(--text-dark); font-size: 1rem; outline: none; transition: 0.3s; }
        .chat-input:focus { background: #fff; border-color: #fdba74; box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1); }
        .chat-input:disabled { background: #e2e8f0; cursor: not-allowed; } 

        .send-btn { background: var(--primary); border: none; width: 52px; height: 52px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: var(--shadow-lg); flex-shrink: 0;}
        .send-btn:hover { background: var(--primary-hover); transform: translateY(-3px) scale(1.05); }
        .send-btn svg { width: 24px; height: 24px; fill: #fff; transform: translateX(2px); }

        /* ================================================== */
        /* ĐOẠN CSS TÁCH BIỆT RIÊNG CHO MOBILE SIÊU MƯỢT      */
        /* ================================================== */
        @media (max-width: 768px) {
            body { padding: 0; }
            .sidebar { width: 100%; border-right: none; background: #f4f7fb;}
            
            /* Khung chat trượt mượt mà từ phải sang */
            .chat-area { position: fixed; top: 0; left: 100%; width: 100%; height: 100dvh; z-index: 999; transition: left 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); }
            body.mobile-in-chat .chat-area { left: 0; }
            
            .back-btn { display: block; }
            .chat-actions button:not(.btn-resolve) { display: none; }
            .chat-actions .btn-resolve { padding: 8px 12px; font-size: 0.8rem; border-radius: 8px;}

            .chat-header { padding: 12px 15px; gap: 5px; }
            .header-avatar { width: 40px; height: 40px; font-size: 1rem; border-radius: 10px;}
            .header-name { font-size: 1.1rem; }
            
            .chat-messages { padding: 15px; gap: 12px; }
            .message { max-width: 85%; padding: 12px 16px; font-size: 0.95rem; border-radius: 16px;}
            .msg-received { border-bottom-left-radius: 4px; }
            .msg-sent { border-bottom-right-radius: 4px; }
            
            /* Khu vực nhập text thiết kế lơ lửng */
            .chat-input-area { padding: 10px 15px; background: #fff; padding-bottom: 20px;}
            .chat-input { font-size: 16px !important; padding: 12px 20px; border-radius: 25px;}
            .send-btn { width: 46px; height: 46px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="brand-title">HOANGKUN <span>CRM</span></div>
            <input type="text" class="search-box" placeholder="Tìm kiếm tên, ID khách hàng...">
        </div>
        <div class="tab-menu">
            <div class="tab active">Đang chờ xử lý</div>
            <div class="tab">Đã hoàn tất</div>
        </div>
        <div class="user-list">
            <div class="user-item">
                <div class="user-avatar" style="background: #cbd5e1;">⏳</div>
                <div class="user-info">
                    <div class="user-top-row">
                        <div class="user-name">Đang tải dữ liệu...</div>
                    </div>
                    <div class="user-preview">Hệ thống đang đồng bộ</div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-client">
                <button class="back-btn" onclick="closeChatMobile()">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <div class="header-avatar" id="active-guest-avatar" style="background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);">K</div>
                <div class="header-info-box">
                    <div class="header-name" id="active-guest-name">Chọn khách hàng</div>
                    <div class="header-status">
                        <span style="width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse-green 2s infinite;"></span>
                        Đang online
                    </div>
                </div>
            </div>
            
            <div class="chat-actions">
                <button>Lịch sử</button>
                <button class="btn-resolve" onclick="resolveChat()">Hoàn tất</button>
            </div>
        </div>

        <div class="chat-messages" id="chat-box">
            </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="msg-input" placeholder="Nhập tin nhắn hỗ trợ..." autocomplete="off">
            <button class="send-btn" onclick="if(typeof sendMessage === 'function') sendMessage();">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        function resolveChat() {
            if (typeof window.currentRoomId === 'undefined' || !window.currentRoomId) {
                alert("Bạn chưa chọn khách hàng nào để kết thúc!"); return;
            }

            firebase.database().ref('chats/' + window.currentRoomId).push({
                sender: 'system', action: 'ADMIN_END_CHAT',
                text: 'Admin Nguyễn Việt Hoàng đã hoàn tất hỗ trợ.', timestamp: Date.now()
            }).then(() => {
                const inputField = document.getElementById('msg-input');
                if (inputField) {
                    inputField.disabled = true; 
                    inputField.placeholder = "Phiên chat này đã được Admin đóng...";
                }
                alert("Đã kết thúc phiên chat thành công!");
            }).catch(error => {
                alert("Có lỗi: " + error);
            });
        }

        // ==========================================
        //  LOGIC TRƯỢT KHUNG CHAT CHO MOBILE & CLICK
        // ==========================================
        document.addEventListener('click', function(e) {
            // Khi bấm vào thẻ khách hàng, kể cả thẻ sinh ra từ JS
            if (e.target.closest('.user-item')) {
                if (window.innerWidth <= 768) {
                    document.body.classList.add('mobile-in-chat');
                }
                
                // Mở khóa lại ô chat
                const inputField = document.getElementById('msg-input');
                if(inputField && inputField.disabled) {
                    inputField.disabled = false;
                    inputField.placeholder = "Nhập tin nhắn hỗ trợ...";
                }
            }
        });

        function closeChatMobile() {
            document.body.classList.remove('mobile-in-chat');
        }

        document.getElementById('msg-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if(typeof window.sendMessage === 'function') window.sendMessage();
            }
        });
    </script>
    
    <script src="main.js"></script>
</body>
</html>
