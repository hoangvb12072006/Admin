<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Quản Lý Chat | HOANGKUN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- ĐỒNG BỘ THEME NEON --- */
        :root {
            --bg-gradient: radial-gradient(circle at center, #14141a 0%, #08080a 100%);
            --card-bg: rgba(20, 20, 27, 0.85);
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --neon-primary: #8b5cf6;
            --neon-secondary: #06b6d4;
            --btn-gradient: linear-gradient(90deg, #8b5cf6, #06b6d4);
            --border-color: rgba(139, 92, 246, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            padding: 20px;
            overflow: hidden;
            gap: 20px;
        }

        /* --- CỘT BÊN TRÁI: DANH SÁCH KHÁCH HÀNG --- */
        .sidebar {
            width: 300px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--neon-secondary);
            text-align: center;
            letter-spacing: 1px;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-item:hover { background: rgba(255,255,255,0.05); }
        .user-item.active { background: rgba(139, 92, 246, 0.15); border: 1px solid var(--neon-primary); }
        
        .user-avatar { width: 40px; height: 40px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--neon-secondary); }
        .user-info { flex: 1; }
        .user-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
        .user-preview { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .unread-badge { background: #ef4444; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* --- CỘT BÊN PHẢI: KHUNG CHAT ADMIN --- */
        .chat-area {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 35px rgba(139, 92, 246, 0.15);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px 20px 0 0;
            gap: 15px;
        }
        .header-avatar { width: 45px; height: 45px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--neon-secondary); border: 2px solid var(--neon-secondary);}

        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message { max-width: 70%; padding: 12px 18px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; }
        
        /* Tin của khách gửi tới Admin */
        .msg-received { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Tin Admin phản hồi */
        .msg-sent { background: var(--btn-gradient); align-self: flex-end; border-bottom-right-radius: 4px; color: #fff; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3); }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 0 0 20px 20px;
        }
        
        .chat-input { flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-color); border-radius: 50px; padding: 0 25px; color: #fff; font-size: 0.95rem; outline: none; }
        .chat-input:focus { border-color: var(--neon-secondary); }
        
        .send-btn { background: var(--btn-gradient); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.1); }
        .send-btn svg { width: 22px; height: 22px; fill: #fff; transform: translateX(2px); }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">QUẢN TRỊ VIÊN</div>
        <div class="user-list">
            <div class="user-item active">
                <div class="user-avatar">K1</div>
                <div class="user-info">
                    <div class="user-name">Khách #8921</div>
                    <div class="user-preview">Đang kết nối...</div>
                </div>
                <div class="unread-badge">1</div>
            </div>
            <div class="user-item">
                <div class="user-avatar">K2</div>
                <div class="user-info">
                    <div class="user-name">Khách #7742</div>
                    <div class="user-preview">Cho mình hỏi lịch up video...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div class="header-avatar">K1</div>
            <div>
                <div style="font-weight: 700; font-size: 1.1rem;">Khách #8921</div>
                <div style="font-size: 0.8rem; color: #10b981;">● Đang truy cập trang chủ</div>
            </div>
        </div>

        <div class="chat-messages" id="chat-box">
            <!-- Tin nhắn tĩnh đã được xóa. Firebase từ file main.js sẽ tự động đổ dữ liệu thật vào đây -->
        </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="msg-input" placeholder="Nhập phản hồi cho Khách #8921..." autocomplete="off">
            <!-- Đã gắn onClick gọi thẳng vào hàm sendMessage của main.js -->
            <button class="send-btn" onclick="if(typeof sendMessage === 'function') sendMessage();">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <!-- 1. THƯ VIỆN FIREBASE (Phải nằm trên file main.js thì mới chạy được) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // Chỉ giữ lại code bắt phím Enter cho tiện, còn hàm đẩy tin nhắn đã nằm trong main.js
        document.getElementById('msg-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if(typeof sendMessage === 'function') sendMessage();
            }
        });
    </script>
    
    <!-- 2. FILE CHỨA LOGIC DATABASE CỦA BẠN -->
    <script src="main.js"></script>
</body>
</html>
