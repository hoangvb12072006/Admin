<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tổng Đài Quản Lý CRM | HOANGKUN STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ea580c; 
            --primary-hover: #c2410c;
            --bg-main: #f1f5f9;
            --bg-panel: #ffffff;
            --border-color: #e2e8f0;
            --text-dark: #0f172a;
            --text-gray: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            height: 100vh;
            height: 100dvh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ========================================= */
        /* CỘT 1: DANH SÁCH KHÁCH HÀNG (SIDEBAR)     */
        /* ========================================= */
        .sidebar {
            width: 350px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            z-index: 10;
        }
        
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border-color); background: #fff; }
        .brand-title { font-size: 1.25rem; font-weight: 800; color: var(--text-dark); display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .brand-title span { color: var(--primary); }
        .search-box { width: 100%; padding: 12px 15px; background: var(--bg-main); border: 1px solid transparent; border-radius: 8px; font-size: 0.9rem; outline: none; transition: all 0.3s ease; }
        .search-box:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.1); }

        .tab-menu { display: flex; padding: 0 20px; border-bottom: 1px solid var(--border-color); }
        .tab { padding: 15px 0; margin-right: 25px; font-size: 0.9rem; font-weight: 600; color: var(--text-gray); cursor: pointer; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 3px 3px 0 0; }

        .user-list { flex: 1; overflow-y: auto; padding: 15px; }
        .user-list::-webkit-scrollbar { width: 5px; }
        .user-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }

        .user-item { padding: 15px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; }
        .user-item:hover { background: var(--bg-main); }
        .user-item.active { background: #fff7ed; border: 1px solid #fed7aa; }
        
        .user-avatar { width: 48px; height: 48px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text-gray); font-size: 1.1rem; position: relative; }
        .user-item.active .user-avatar { background: #fed7aa; color: var(--primary); }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #10b981; border: 2px solid #fff; border-radius: 50%; }
        
        .user-info { flex: 1; overflow: hidden; }
        .user-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .user-name { font-weight: 700; font-size: 0.95rem; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-time { font-size: 0.75rem; color: var(--text-gray); }
        .user-preview { font-size: 0.85rem; color: var(--text-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: #ef4444; color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; font-weight: 700; margin-top: 5px; display: inline-block;}

        /* ========================================= */
        /* CỘT 2: KHUNG CHAT ADMIN                   */
        /* ========================================= */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }

        .chat-header { padding: 20px 30px; background: var(--bg-panel); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .chat-header-client { display: flex; align-items: center; gap: 15px; }
        .header-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--bg-main); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: var(--text-gray); }
        .header-name { font-weight: 800; font-size: 1.2rem; color: var(--text-dark); margin-bottom: 4px; }
        .header-status { font-size: 0.85rem; color: #10b981; display: flex; align-items: center; gap: 6px; font-weight: 500;}
        
        .chat-actions button { background: #fff; border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); cursor: pointer; transition: 0.2s; }
        .chat-actions button:hover { background: var(--bg-main); }
        .chat-actions .btn-resolve { background: #10b981; color: #fff; border-color: #10b981; margin-left: 10px; }
        .chat-actions .btn-resolve:hover { background: #059669; }
        
        /* Nút Back ẩn mặc định trên PC */
        .back-btn { display: none; background: none; border: none; color: var(--text-dark); cursor: pointer; align-items: center; justify-content: center; margin-right: 5px;}
        .back-btn svg { width: 32px; height: 32px; fill: currentColor; }

        .chat-messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .message { max-width: 65%; padding: 14px 20px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; position: relative; }
        .msg-received { background: #ffffff; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); color: var(--text-dark); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .msg-sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; color: #fff; box-shadow: 0 4px 15px rgba(234, 88, 12, 0.2); }

        .chat-input-area { padding: 25px 30px; background: var(--bg-panel); border-top: 1px solid var(--border-color); display: flex; gap: 15px; align-items: center; }
        .chat-input { flex: 1; background: var(--bg-main); border: 1px solid transparent; border-radius: 25px; padding: 15px 25px; color: var(--text-dark); font-size: 0.95rem; outline: none; transition: 0.3s; }
        .chat-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.1); }
        .chat-input:disabled { background: #e2e8f0; cursor: not-allowed; } /* Màu khi bị khóa chát */

        .send-btn { background: var(--primary); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(234, 88, 12, 0.3); }
        .send-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .send-btn svg { width: 22px; height: 22px; fill: #fff; transform: translateX(2px); }

        /* ================================================== */
        /*    ĐOẠN CSS TÁCH BIỆT RIÊNG CHO MOBILE             */
        /* ================================================== */
        @media (max-width: 768px) {
            body { padding: 0; }
            .sidebar { width: 100%; border-right: none; }
            .chat-area { position: fixed; top: 0; left: 100%; width: 100%; height: 100dvh; z-index: 999; transition: left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
            body.mobile-in-chat .chat-area { left: 0; }
            .back-btn { display: flex; }
            .chat-actions { display: none; } /* Trên mobile để cho gọn, mình có thể thêm nút Hoàn tất nhỏ xíu nếu muốn, nhưng hiện tại ẩn đi cho rộng màn */
            
            /* Ép font to chống thu phóng */
            .chat-input { font-size: 16px !important; padding: 12px 20px; }
            .chat-header { padding: 15px 15px; }
            .header-avatar { width: 42px; height: 42px; font-size: 1rem; }
            .header-name { font-size: 1.1rem; }
            .chat-messages { padding: 15px; gap: 12px; }
            .message { max-width: 85%; padding: 12px 16px; font-size: 0.95rem; }
            .chat-input-area { padding: 12px 15px; }
            .send-btn { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>

    <!-- CỘT DANH SÁCH KHÁCH HÀNG (Bên ngoài) -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="brand-title">HOANGKUN <span>CRM</span></div>
            <input type="text" class="search-box" placeholder="🔍 Tìm kiếm khách hàng...">
        </div>
        <div class="tab-menu">
            <div class="tab active">Đang chờ (1)</div>
            <div class="tab">Đã giải quyết</div>
        </div>
        <div class="user-list">
            <!-- Firebase sẽ đổ danh sách khách vào đây -->
            <div class="user-item active">
                <div class="user-avatar">
                    K
                    <span class="status-dot"></span>
                </div>
                <div class="user-info">
                    <div class="user-top-row">
                        <div class="user-name">Khách Demo</div>
                        <div class="user-time">Vừa xong</div>
                    </div>
                    <div class="user-preview">Đang kết nối nhận hỗ trợ...</div>
                    <div class="unread-badge">1 tin nhắn mới</div>
                </div>
            </div>
        </div>
    </div>

    <!-- CỘT KHUNG CHAT (Nằm ở trong, sẽ trượt ra khi bấm) -->
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-client">
                <!-- Nút Quay Lại (Back) chỉ hiện trên Mobile -->
                <button class="back-btn" onclick="closeChatMobile()">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <div class="header-avatar" id="active-guest-avatar">K</div>
                <div>
                    <div class="header-name" id="active-guest-name">Chọn khách hàng</div>
                    <div class="header-status">
                        <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block;"></span>
                        Đang online
                    </div>
                </div>
            </div>
            
            <div class="chat-actions">
                <button>Lịch sử</button>
                <!-- 👇 NÚT HOÀN TẤT HỖ TRỢ DÀNH CHO ADMIN 👇 -->
                <button class="btn-resolve" onclick="resolveChat()">Hoàn tất hỗ trợ</button>
            </div>
        </div>

        <div class="chat-messages" id="chat-box">
            <!-- Firebase sẽ tự động đổ dữ liệu vào đây -->
        </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="msg-input" placeholder="Nhập tin nhắn hỗ trợ..." autocomplete="off">
            <button class="send-btn" onclick="if(typeof sendMessage === 'function') sendMessage();">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <!-- FIREBASE & SCRIPT -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        //  1. HÀM KẾT THÚC CHAT & GỬI LỆNH XUỐNG KHÁCH
        // ==========================================
        function resolveChat() {
            // Kiểm tra xem Admin đã chọn phòng chat nào chưa (biến currentRoomId phải được khai báo toàn cục ở main.js của Admin)
            if (typeof window.currentRoomId === 'undefined' || !window.currentRoomId) {
                alert("Bạn chưa chọn khách hàng nào để kết thúc!");
                return;
            }

            // Gửi lệnh ADMIN_END_CHAT xuống cho máy khách bung bảng Đánh Giá
            firebase.database().ref('chats/' + window.currentRoomId).push({
                sender: 'system',
                action: 'ADMIN_END_CHAT',
                text: 'Admin Nguyễn Việt Hoàng đã hoàn tất hỗ trợ.',
                timestamp: Date.now()
            }).then(() => {
                // Sau khi gửi lệnh thành công -> Khóa ô chat của Admin lại
                const inputField = document.getElementById('msg-input');
                if (inputField) {
                    inputField.disabled = true; // Không cho gõ nữa
                    inputField.placeholder = "Phiên chat này đã được Admin đóng...";
                }
                alert("Đã kết thúc phiên chat! Máy khách hàng sẽ tự động hiện form Đánh giá 5 Sao.");
            }).catch(error => {
                alert("Có lỗi xảy ra: " + error);
            });
        }

        // ==========================================
        //  2. LOGIC TRƯỢT KHUNG CHAT CHO MOBILE & CLICK
        // ==========================================
        document.addEventListener('click', function(e) {
            // Ủy quyền sự kiện click: Khi bấm vào bất kỳ thẻ khách hàng nào (.user-item)
            if (e.target.closest('.user-item')) {
                // Nếu là mobile, kéo khung chat ra
                if (window.innerWidth <= 768) {
                    document.body.classList.add('mobile-in-chat');
                }
                
                // Mở khóa lại ô chat nếu lỡ chọn trúng người cũ bị khóa
                const inputField = document.getElementById('msg-input');
                if(inputField && inputField.disabled) {
                    inputField.disabled = false;
                    inputField.placeholder = "Nhập tin nhắn hỗ trợ...";
                }
            }
        });

        function closeChatMobile() {
            document.body.classList.remove('mobile-in-chat');
        }

        // Bắt sự kiện phím Enter
        document.getElementById('msg-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if(typeof window.sendMessage === 'function') window.sendMessage();
            }
        });
    </script>
    
    <!-- Link file main.js của Admin -->
    <script src="main.js"></script>
</body>
</html>
